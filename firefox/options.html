<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Env Switcher — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      max-width: 600px;
      margin: 40px auto;
      padding: 24px;
    }
    h1 {
      font-size: 20px;
      color: #e94560;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 12px;
      color: #7a7a9a;
      margin-bottom: 24px;
    }
    .env-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px;
      background: #16213e;
      border-radius: 6px;
      border: 1px solid #2a2a4a;
    }
    .env-row label {
      font-size: 11px;
      color: #7a7a9a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 80px;
    }
    .env-row input {
      flex: 1;
      padding: 7px 10px;
      background: #0f0f23;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: monospace;
    }
    .env-row input:focus {
      outline: none;
      border-color: #e94560;
    }
    .env-row .btn-remove {
      background: transparent;
      border: 1px solid #3a2040;
      color: #e94560;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: background 0.15s;
    }
    .env-row .btn-remove:hover {
      background: #3a2040;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    .btn {
      padding: 10px 20px;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #e94560;
      color: #fff;
      border-color: #e94560;
    }
    .btn-primary:hover {
      background: #d63852;
    }
    .btn-secondary {
      background: #16213e;
      color: #c0c0d0;
    }
    .btn-secondary:hover {
      background: #1f2f50;
    }
    .btn-reset {
      background: transparent;
      color: #6a6a8a;
      border-color: transparent;
    }
    .btn-reset:hover {
      color: #e0e0e0;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 18px;
      background: #4ecca3;
      color: #1a1a2e;
      font-size: 13px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <h1>Environment Settings</h1>
  <p class="subtitle">Configure the base URLs for each environment. Click to switch preserves path, query, and hash.</p>

  <div id="env-rows"></div>

  <div class="actions">
    <button id="btn-add" class="btn btn-secondary">+ Add Environment</button>
    <button id="btn-save" class="btn btn-primary">Save</button>
    <button id="btn-reset" class="btn btn-reset">Reset to defaults</button>
  </div>

  <div id="toast" class="toast">Saved.</div>

  <script src="options.js"></script>
</body>
</html>
